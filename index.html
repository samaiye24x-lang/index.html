<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Beyond Fear</title>

<style>

body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background: radial-gradient(circle at top,#e0c3fc,#6a5acd);
}

/* PARTICLES */
body::before {
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background: radial-gradient(white 1px, transparent 1px);
    background-size:40px 40px;
    animation: move 20s linear infinite;
    opacity:0.2;
}

@keyframes move {
    from {transform:translateY(0);}
    to {transform:translateY(-200px);}
}

/* LIGHT GLOW */
body::after {
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background: radial-gradient(circle, rgba(255,255,255,0.2), transparent);
    animation: glow 6s infinite alternate;
}

@keyframes glow {
    from {opacity:0.2;}
    to {opacity:0.6;}
}

/* GLASS CARD */
.card {
    backdrop-filter: blur(40px);
    background: rgba(255,255,255,0.08);
    padding:25px;
    border-radius:30px;
    width:90%;
    max-width:360px;
    text-align:center;
    border:1px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 80px rgba(255,255,255,0.3);
    animation: float 5s ease-in-out infinite;
}

@keyframes float {
    50% {transform: translateY(-12px);}
}

/* TITLE */
h1 {
    letter-spacing:3px;
    text-shadow:0 0 25px rgba(255,255,255,0.9);
}

/* FOX (SVG glow) */
.fox {
    width:80px;
    margin:15px auto;
    filter: drop-shadow(0 0 20px white);
}

/* TEXT */
p {
    font-size:14px;
    line-height:1.6;
}

/* BUTTON BOX */
.box {
    margin-top:20px;
    padding:15px;
    border-radius:20px;
    background: rgba(255,255,255,0.12);
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:15px;
    background: rgba(255,255,255,0.25);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 0 20px rgba(255,255,255,0.4);
}

button:hover {
    background: rgba(255,255,255,0.5);
}

/* SUBTEXT */
.sub {
    margin-top:8px;
    font-size:13px;
}

/* TRANSLATOR */
select {
    margin-bottom:10px;
    border-radius:10px;
    padding:5px;
}

</style>
</head>

<body>

<div class="card">

<select onchange="translate(this.value)">
<option value="en">English</option>
<option value="hi">Hindi</option>
</select>

<h1 id="title">BEYOND FEAR</h1>

<!-- FOX -->
<svg class="fox" viewBox="0 0 100 100">
<polygon points="50,10 80,40 65,90 35,90 20,40" fill="white"/>
</svg>

<p id="desc">
We're building a definitive collective to transcend the shadows of uncertainty. 
Join us as we cultivate a future where every woman navigates the world with absolute sovereignty—truly Beyond Fear.
</p>

<div class="box">

<button onclick="goToInsta()" id="btn">
Follow Us
</button>

<div class="sub" id="sub">
For a safer tomorrow
</div>

</div>

</div>

<script>

function goToInsta(){
    window.location.href="https://instagram.com/samaiye24x";
}

function translate(lang){
    if(lang==="hi"){
        title.innerText="डर से परे";
        desc.innerText="हम एक ऐसा समूह बना रहे हैं जो अनिश्चितता के अंधेरे को पार करे। हम एक ऐसा भविष्य बना रहे हैं जहाँ हर महिला पूरी स्वतंत्रता और आत्मविश्वास के साथ आगे बढ़े — सच में डर से परे।";
        btn.innerText="हमें फॉलो करें";
        sub.innerText="एक सुरक्षित कल के लिए";
    } else {
        title.innerText="BEYOND FEAR";
        desc.innerText="We're building a definitive collective to transcend the shadows of uncertainty. Join us as we cultivate a future where every woman navigates the world with absolute sovereignty—truly Beyond Fear.";
        btn.innerText="Follow Us";
        sub.innerText="For a safer tomorrow";
    }
}

</script>

</body>
</html>
